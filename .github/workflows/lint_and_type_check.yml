name: Lint & Type Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: lint-and-type-check-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Get changed Python files
      id: files
      run: |
        git fetch origin "${{ github.event.pull_request.base.ref }}"

        BASE="${{ github.event.pull_request.base.sha }}"
        HEAD="origin/${{ github.event.pull_request.head.ref }}"

        git diff \
          --diff-filter=ACMR \
          --name-only \
          "$BASE" \
          "$HEAD" \
          -- '*.py' > changed_files.txt

        if [ -s changed_files.txt ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
        else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Ruff check
      if: steps.files.outputs.has_files == 'true'
      run: |
        xargs -a changed_files.txt ruff check --output-format=github

    - name: Mypy
      if: steps.files.outputs.has_files == 'true'
      run: |
        xargs -a changed_files.txt mypy --no-color-output \
          | sed -E 's/^(.*\.py):([0-9]+): (error|note): (.*)$/::\3 file=\1,line=\2::\4/'

    - name: No Python files changed
      if: steps.files.outputs.has_files == 'false'
      run: |
        echo "No Python files changed."