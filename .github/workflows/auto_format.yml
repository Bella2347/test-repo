name: Format Python

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Get PR base/head SHAs
        id: pr
        run: |
          echo "base=${{ github.event.pull_request.base.sha }}"
          echo "head=${{ github.event.pull_request.head.sha }}"

      - name: Get changed Python files
        id: files
        run: |
          git diff \
            --diff-filter=ACMR \
            --name-only \
            "${{ steps.pr.outputs.base }}" \
            "${{ steps.pr.outputs.head }}" \
            -- '*.py' > changed_files.txt

          if [ -s changed_files.txt ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ruff format
        if: steps.files.outputs.has_files == 'true'
        run: |
          xargs -a changed_files.txt ruff format

      - name: Commit formatting changes
        if: steps.files.outputs.has_files == 'true'
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            xargs -a changed_files.txt git add

            git commit -m "Apply Ruff formatting"
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No formatting changes needed"
          fi