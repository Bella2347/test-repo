[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [".git", ".venv", "__pycache__"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "B",   # bugbear
  "UP",  # pyupgrade
  "TCH", # type-checking best practices
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
show_error_codes = true
pretty = true
